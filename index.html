<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Velvet Frequency Rotation Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#14121c; --panel:#1f1c2b; --panel2:#262234; --line:#3a3550;
  --blue:#9fc5e8; --blue-strong:#5b9bd5; --blue-soft:#cfe2f3;
  --gold:#f1c232; --text:#f3f1f7; --muted:#9d97b3; --row:#23202f;
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  background:radial-gradient(1200px 600px at 70% -10%, #241f38 0%, var(--ink) 60%) fixed, var(--ink);
  color:var(--text); font-family:"Inter",system-ui,sans-serif; font-size:14px; line-height:1.4;
  padding:0 0 80px;
}
.wrap{max-width:1280px; margin:0 auto; padding:18px}
h1,h2,h3{font-family:"Oswald",sans-serif; font-weight:600; letter-spacing:.04em; margin:0}
button,select,input{font-family:inherit; color:inherit}
button{cursor:pointer}

/* toolbar */
.toolbar{display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:16px}
.toolbar .spacer{flex:1}
.btn{background:var(--panel2); border:1px solid var(--line); color:var(--text);
  padding:8px 14px; border-radius:8px; font-weight:600; font-size:13px; transition:.15s}
.btn:hover{border-color:var(--blue-strong); background:#2d283d}
.btn.primary{background:var(--blue-strong); border-color:var(--blue-strong); color:#0b1626}
.btn.primary:hover{background:var(--blue)}
.brand{font-family:"Oswald"; font-weight:700; font-size:18px; letter-spacing:.12em;
  text-transform:uppercase; color:#e0445e}
.brand small{display:block; font-family:"Inter"; font-weight:500; font-size:10px;
  letter-spacing:.18em; color:var(--muted)}

/* panel shell */
.panel{background:var(--panel); border:1px solid var(--line); border-radius:14px;
  padding:16px; margin-bottom:16px; box-shadow:0 12px 30px -18px #000}

/* header / setup */
.head-top{display:flex; gap:16px; align-items:flex-start; flex-wrap:wrap}
.rot-name{flex:1 1 320px}
.rot-name input{width:100%; background:transparent; border:none; border-bottom:2px solid var(--line);
  font-family:"Oswald"; font-weight:700; font-size:30px; letter-spacing:.03em; padding:2px 0; color:var(--text)}
.rot-name input:focus{outline:none; border-color:var(--gold)}
.tier{display:flex; align-items:center; gap:8px}
.tier select{border:none; border-radius:8px; font-family:"Oswald"; font-weight:700; letter-spacing:.1em;
  font-size:20px; padding:14px 18px; text-transform:uppercase; background:var(--gold); color:#3a2c00; transition:.15s}
.tier.type-mld select{background:var(--gold); color:#3a2c00}
.tier.type-dod select{background:#9b5de5; color:#1a0a2e}
.tier.type-nod select{background:#e0445e; color:#2c0710}
.meta{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; margin-top:14px}
.field label{display:block; font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); margin-bottom:4px}
.field input,.field select{width:100%; background:var(--panel2); border:1px solid var(--line);
  border-radius:8px; padding:8px 10px; font-weight:600}
.field input:focus,.field select:focus{outline:none; border-color:var(--blue-strong)}
.meta-big{display:flex; flex-wrap:wrap; gap:14px}
.meta-big .field{flex:1 1 220px}
.meta-big .field label{font-size:11px; margin-bottom:6px}
.meta-big .field input,.meta-big .field select{height:56px; font-size:20px; font-weight:700; padding:0 16px}
.meta-big .type-field{flex:0 0 112px}
.meta-big .patch-field{flex:0 0 112px}
.type-field label{display:block; font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); margin-bottom:6px}
.type-field .tier{display:block}
.type-field .tier select{width:100%; height:56px; padding:0 14px}

/* team */
.section-title{display:flex; align-items:center; gap:10px; margin:0 0 12px}
.section-title h2{font-size:16px; text-transform:uppercase; color:var(--blue)}
.section-title .rule{flex:1; height:1px; background:var(--line)}
.units{display:grid; grid-template-columns:repeat(auto-fit,minmax(188px,1fr)); gap:12px}
.unit{background:var(--panel2); border:1px solid var(--line); border-radius:12px; overflow:hidden;
  border-top:3px solid var(--ux,#888)}
.unit .art{aspect-ratio:1/1; background:#0d0b14 center/cover no-repeat; position:relative; display:flex;
  align-items:center; justify-content:center}
.unit .art .ph{font-family:"Oswald"; font-weight:700; font-size:30px; color:#4a4560}
.unit .body{padding:8px}
.unit select.name{width:100%; background:#15131d; border:1px solid var(--line); border-radius:6px;
  padding:8px; font-family:"Oswald"; font-weight:600; font-size:16px; letter-spacing:.05em; text-align:center}
.unit .tags{display:flex; gap:6px; margin-top:6px}
.unit .tags select{flex:1; background:#15131d; border:1px solid var(--line); border-radius:6px; padding:5px; font-size:12px; font-weight:600}
.unit .gear{width:100%; margin-top:6px; background:#15131d; border:1px solid var(--line); border-radius:6px; padding:5px; font-size:11px; color:var(--blue-soft)}
.rev-row{display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:6px; align-items:end}
.rev-row.one{grid-template-columns:1fr}
.rev-lab{font-size:9px; letter-spacing:.04em; text-transform:uppercase; color:var(--muted); margin-bottom:2px; line-height:1.15}
.rev-row select{width:100%; background:#15131d; border:1px solid var(--line); border-radius:6px; padding:5px; font-size:11px; font-weight:600; color:var(--blue-soft)}
.rev-row select:focus{outline:none; border-color:var(--blue-strong)}
.unit.elu{border-top-style:dashed}
.unit .grip{position:absolute; top:6px; right:6px; z-index:2; background:#000a; border:1px solid var(--line);
  color:#dfe6f5; border-radius:6px; padding:1px 6px 3px; cursor:grab; font-size:13px; line-height:1; user-select:none}
.unit .grip:active{cursor:grabbing}
.unit.dragging{opacity:.45}
.unit.drag-over{outline:2px dashed var(--blue-strong); outline-offset:2px}
.elu-badge{position:absolute; top:6px; left:6px; background:#0008; border:1px solid var(--blue-strong);
  color:var(--blue); font-size:9px; letter-spacing:.12em; padding:2px 6px; border-radius:5px; font-weight:700}
.order-badge{position:absolute; top:6px; left:6px; z-index:2; background:#0008; border:1px solid var(--gold);
  color:var(--gold); font-family:"Oswald"; font-weight:700; font-size:12px; line-height:1;
  min-width:20px; height:20px; padding:0 4px; display:flex; align-items:center; justify-content:center; border-radius:5px}

.subrow{display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:10px; margin-top:14px}
.minicard{background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:10px}
.minicard label{font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted)}
.minicard .vals{display:flex; flex-direction:column; gap:6px; margin-top:6px}
.minicard select,.minicard input{background:#15131d; border:1px solid var(--line); border-radius:6px; padding:6px; font-weight:600; width:100%}
.persona-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:14px}
.persona-col{position:relative}
.pcol-head{display:flex; align-items:center; justify-content:space-between; gap:6px}
.pgrip{cursor:grab; color:var(--muted); user-select:none; font-size:13px; line-height:1; padding:0 2px}
.pgrip:active{cursor:grabbing}
.persona-col.dragging{opacity:.45}
.persona-col.drag-over{outline:2px dashed var(--blue-strong); outline-offset:2px}
.persona-col select{width:100%; margin-top:6px; background:#15131d; border:1px solid var(--line); border-radius:6px;
  padding:9px; font-family:"Oswald"; font-weight:600; font-size:16px; letter-spacing:.04em}
.persona-col .skills{display:flex; flex-direction:column; gap:6px; margin-top:8px}
.persona-col .skills input{width:100%; background:#15131d; border:1px solid var(--line); border-radius:6px; padding:6px; font-size:12px; font-weight:600}
.persona-col select:focus,.persona-col .skills input:focus{outline:none; border-color:var(--blue-strong)}
@media (max-width:640px){ .persona-grid{grid-template-columns:1fr} }
.team-notes{margin-top:14px}
.team-notes .tn-label{display:block; font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); margin-bottom:6px}
.team-notes textarea{width:100%; min-height:60px; background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:10px; color:var(--text); font-family:inherit; font-size:16px; resize:vertical}
.team-notes textarea:focus{outline:none; border-color:var(--blue-strong)}

/* rotation */
.turns{display:flex; gap:12px; overflow-x:auto; padding-bottom:8px}
.turn{flex:0 0 280px; background:var(--panel2); border:1px solid var(--line); border-radius:12px; display:flex; flex-direction:column}
.turn-head{display:flex; align-items:center; gap:6px; background:linear-gradient(180deg,#34507a,#26405f);
  padding:8px 10px; border-radius:11px 11px 0 0}
.turn-head .star{color:var(--gold)}
.turn-head input{flex:1; background:transparent; border:none; color:#fff; font-family:"Oswald";
  font-weight:600; letter-spacing:.08em; font-size:15px; text-align:center; text-transform:uppercase}
.turn-head input:focus{outline:none}
.turn-head .del{background:#0003; border:none; color:#cdd9ee; border-radius:6px; width:24px; height:24px; line-height:1}
.turn-head .del:hover{background:#e06; color:#fff}
.acts{padding:8px; display:flex; flex-direction:column; gap:6px; flex:1}
.act{display:grid; grid-template-columns:22px 1fr 26px; gap:6px; align-items:stretch;
  background:var(--row); border:1px solid var(--line); border-left:4px solid var(--ax,#666); border-radius:8px; padding:6px}
.act .n{font-family:"Oswald"; font-weight:700; color:var(--muted); display:flex; align-items:center; justify-content:center; cursor:grab; user-select:none}
.act .n:active{cursor:grabbing}
.act.dragging{opacity:.45}
.act.drop-before{box-shadow:inset 0 3px 0 0 var(--blue-strong)}
.act .mid{display:flex; flex-direction:column; gap:4px; min-width:0}
.act .mid select{background:#15131d; border:1px solid var(--line); border-radius:5px; padding:4px; font-weight:600; font-size:12px}
.act .mid input{background:#15131d; border:1px solid var(--line); border-radius:5px; padding:5px; font-size:12px}
.act .mid input:focus,.act .mid select:focus{outline:none; border-color:var(--blue-strong)}
.act-btns{display:flex; flex-direction:column; gap:3px}
.act-btns button{flex:1; border:none; border-radius:5px; line-height:1; font-weight:700; cursor:pointer; padding:0; min-height:14px}
.act-btns .addrow{background:#0003; color:#8aa6c8; font-size:13px}
.act-btns .addrow:hover{background:#2e6b4d; color:#cffbe2}
.act-btns .x{background:transparent; color:#6a647f; font-size:14px}
.act-btns .x:hover{background:#e0245533; color:#ff6b8a}
.add-act{margin:0 8px 8px; background:#15131d; border:1px dashed var(--line); color:var(--muted);
  border-radius:8px; padding:7px; font-weight:600}
.add-act:hover{border-color:var(--blue-strong); color:var(--blue)}
.add-turn{flex:0 0 60px; align-self:stretch; background:transparent; border:2px dashed var(--line);
  color:var(--muted); border-radius:12px; font-size:26px; font-family:"Oswald"}
.add-turn:hover{border-color:var(--gold); color:var(--gold)}
.notes-row{margin-top:12px}
.notes-row textarea{width:100%; min-height:54px; background:var(--panel2); border:1px solid var(--line);
  border-radius:10px; padding:10px; color:var(--text); font-family:inherit; font-size:16px; resize:vertical}
.foot{color:var(--muted); font-size:11px; text-align:center; margin-top:8px}
.foot a{color:var(--blue)}
@media (max-width:560px){ .rot-name input{font-size:22px} }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div class="wrap">
  <div class="toolbar">
    <div class="brand">Velvet Frequency<small>ROTATION PLANNER</small></div>
    <div class="spacer"></div>
    <button class="btn" id="importBtn">Import JSON</button>
    <button class="btn" id="exportBtn">Export JSON</button>
    <button class="btn" id="exportImgBtn">Export Image</button>
    <button class="btn" id="exportImgArtBtn">Export Image+Art</button>
    <button class="btn" id="exportCsvBtn">Export Sheet</button>
    <button class="btn" id="resetBtn">Reset</button>
    <input type="file" id="importFile" accept="application/json" hidden/>
  </div>

  <div class="panel" id="headPanel"></div>
  <div class="panel" id="teamPanel"></div>
  <div class="panel">
    <div class="section-title"><h2>Rotation</h2><div class="rule"></div>
      <button class="btn" id="autoFill" title="Fill all turns with characters 1–4 in order">Auto Fill</button>
      <button class="btn" id="clearActions" title="Remove all actions from every turn">Clear</button>
    </div>
    <div class="turns" id="turns"></div>
    <div class="notes-row"><textarea id="notes" placeholder="Notes…"></textarea></div>
  </div>
  <div class="foot">Made by Koduck from 1AM. Join us @ <a href="https://discord.gg/velvetfrequency" target="_blank" rel="noopener">Discord</a><br>Autosave is on (stored locally in your browser) · Export JSON to save your work as a file.</div>
</div>

/* ---------- helpers ---------- */
const KNOWN_COLORS = {WONDER:'#c2002e'};
const TWINS_ROLES = ['Sweeper','Assassin','Strategist','Saboteur','Medic','Guardian'];
function charColor(name){
  if(!name) return '#666';
  const u=name.toUpperCase();
  if(DATA.charColors && DATA.charColors[u]) return DATA.charColors[u];
  if(KNOWN_COLORS[u]) return KNOWN_COLORS[u];
  let h=0; for(const c of u) h=(h*31+c.charCodeAt(0))%360;
  return `hsl(${h} 55% 70%)`;
}
function imgFor(name){
  if(!name) return '';
  return DATA.characterImages[name.toUpperCase()] || DATA.characterImages[name] || '';
}
function opt(list, val){
  return list.map(o=>`<option ${o===val?'selected':''}>${esc(o)}</option>`).join('');
}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ---------- state ---------- */
const KEY='paradise-rotation-v1';
function defaultState(){
  const i=DATA.initial;
  function mk(n,aw,rv,g){
    const u={name:n,awareness:aw,rev:rv,gear:'',space:'',sunsky:'',role:'',companion:''};
    if((n||'').toUpperCase()==='WONDER'){ u.awareness='DGR'; u.rev='R6'; u.gear=g; }
    else if(g && g.indexOf(' & ')>-1){ const p=g.split(' & '); u.space=p[0].trim(); u.sunsky=p[1].trim(); }
    return u;
  }
  const units=i.team.map((n,k)=>mk(n,i.awareness[k]||'A0',i.rev[k]||'R0',i.gear[k]||''));
  return {
    setup:{rotationName:i.rotationName,tier:i.tier,boss:i.boss,type:i.type,patch:i.patch,score:i.score,notes:i.notes,credits:i.credits||''},
    units,
    elucidator:mk(i.elucidator,i.awareness[4]||'A6',i.rev[4]||'R6',i.gear[4]||''),
    personas:i.persona.map((n,k)=>({name:n, skills:[ i.skills[k]||'', '', '' ]})),
    teamNotes:'',
    turns:JSON.parse(JSON.stringify(i.turns)),
  };
}
function blankState(){
  const u=()=>({name:'',awareness:'',rev:'',gear:'',space:'',sunsky:'',role:'',companion:''});
  return {
    setup:{rotationName:'',tier:'',boss:'',type:'MLD',patch:'',score:'',notes:'',credits:''},
    units:[{name:'WONDER',awareness:'DGR',rev:'R6',gear:'',space:'',sunsky:'',role:'',companion:''},u(),u(),u()],
    elucidator:u(),
    personas:[{name:'',skills:['','','']},{name:'',skills:['','','']},{name:'',skills:['','','']}],
    teamNotes:'',
    turns:Array.from({length:6},(_,i)=>({name:'TURN '+(i+1),actions:[{char:'',action:''}]})),
  };
}
let state;
function migrate(st){
  if(!st.personas){
    const names=st.persona||DATA.initial.persona;
    const old=st.skills||[];
    st.personas=names.map((n,k)=>({name:n,skills:[old[k]||'','','']}));
  }
  st.personas.forEach(p=>{ p.skills=p.skills||[]; while(p.skills.length<3)p.skills.push(''); p.skills=p.skills.slice(0,3); });
  [].concat(st.units||[], st.elucidator?[st.elucidator]:[]).forEach(u=>{
    if(!u) return;
    if(u.space===undefined)u.space='';
    if(u.sunsky===undefined)u.sunsky='';
    if(u.gear===undefined)u.gear='';
    if(u.role===undefined)u.role='';
    if(u.companion===undefined)u.companion='';
    const isW=(u.name||'').toUpperCase()==='WONDER';
    if(!isW && !u.space && !u.sunsky && u.gear && u.gear.indexOf(' & ')>-1){ const p=u.gear.split(' & '); u.space=p[0].trim(); u.sunsky=p[1].trim(); u.gear=''; }
  });
  if(st.teamNotes===undefined) st.teamNotes='';
  if(st.setup && st.setup.credits===undefined) st.setup.credits='';
  return st;
}
function load(){ try{const s=localStorage.getItem(KEY); if(s) return migrate(JSON.parse(s));}catch(e){} return defaultState(); }
function save(){ try{localStorage.setItem(KEY, JSON.stringify(state));}catch(e){} }

  const s=state.setup;
  document.getElementById('headPanel').innerHTML=`
    <div class="head-top">

    </div>
    <div class="meta meta-big">
      <div class="type-field"><label>Type</label><div class="tier type-${(s.type||'').toLowerCase()}"><select id="f_type">${opt(DATA.typeOpts,s.type)}</select></div></div>
      <div class="field"><label>Boss</label><input id="f_boss" list="bossList" value="${esc(s.boss)}" placeholder="Boss"/></div>
      <div class="field patch-field"><label>Patch</label><input id="f_patch" value="${esc(s.patch)}"/></div>
      <div class="field"><label>Expected Score</label><input id="f_score" value="${esc(s.score)}"/></div>
      <div class="field credits-field"><label>Credits</label><input id="f_credits" value="${esc(s.credits||'')}" placeholder="Credits"/></div>
    </div>
    <datalist id="bossList">${DATA.bossNames.map(b=>`<option value="${esc(b)}"></option>`).join('')}</datalist>`;
  bind('f_name','setup.rotationName');
  bind('f_credits','setup.credits');
  const tsel=document.getElementById('f_type');
  tsel.onchange=()=>{ state.setup.type=tsel.value; save(); tsel.closest('.tier').className='tier type-'+tsel.value.toLowerCase(); };
  bind('f_boss','setup.boss');
  bind('f_patch','setup.patch'); bind('f_score','setup.score');
}

/* ---------- render: team ---------- */
function unitCard(u, path, elu, idx){
  const col=charColor(u.name); const img=imgFor(u.name);
  const names = elu ? DATA.elucidatorOpts : DATA.characterNames.filter(n=>!(DATA.elucidatorNames||[]).includes(n));
  let nameOpts=[''].concat(names);
  if(u.name && !nameOpts.includes(u.name)) nameOpts=[''].concat([u.name]).concat(names);
  const isW = !elu && (u.name||'').toUpperCase()==='WONDER';
  const awareOpts = isW ? ['DGR'] : [''].concat(DATA.awarenessOpts.filter(o=>o!=='DGR'));
  const revFull = [''].concat(DATA.revOpts);
  if(isW){ if(u.awareness!=='DGR') u.awareness='DGR'; }
  else if(!awareOpts.includes(u.awareness)) u.awareness='';
  if(!revFull.includes(u.rev)) u.rev='';
  // Wonder -> single Dagger select; everyone else -> Space + Sun/Moon/Star/Sky
  let revBlock;
  if(isW){
    if(u.gear && !DATA.daggerNames.includes(u.gear)) u.gear='';
    let gOpts=[''].concat(DATA.daggerNames);
    if(u.gear && !gOpts.includes(u.gear)) gOpts=[''].concat([u.gear]).concat(DATA.daggerNames);
    revBlock=`<div class="rev-row one"><div><div class="rev-lab">Dagger</div><select class="gear" data-path="${path}.gear">${opt(gOpts,u.gear)}</select></div></div>`;
  } else {
    let spOpts=[''].concat(DATA.spaceCards); if(u.space && !spOpts.includes(u.space)) spOpts=[''].concat([u.space]).concat(DATA.spaceCards);
    const ssBase = (u.space && DATA.spacePartners && DATA.spacePartners[u.space]) ? DATA.spacePartners[u.space] : DATA.sunSkyCards;
    let ssOpts=[''].concat(ssBase); if(u.sunsky && !ssOpts.includes(u.sunsky)) ssOpts=[''].concat([u.sunsky]).concat(ssBase);
    revBlock=`<div class="rev-row">
      <div><div class="rev-lab">Space</div><select data-path="${path}.space">${opt(spOpts,u.space)}</select></div>
      <div><div class="rev-lab">Sun/Moon/Star/Sky</div><select data-path="${path}.sunsky">${opt(ssOpts,u.sunsky)}</select></div>
    </div>`;
  }
  const nm=(u.name||'').toUpperCase();
  let extraBlock='';
  if(nm==='TWINS'){
    let rOpts=[''].concat(TWINS_ROLES);
    if(u.role && !rOpts.includes(u.role)) rOpts=[''].concat([u.role]).concat(TWINS_ROLES);
    extraBlock+=`<div class="rev-row one"><div><div class="rev-lab">Role</div><select data-path="${path}.role">${opt(rOpts,u.role)}</select></div></div>`;
  }
  if(nm==='FUUKA'){
    const compNames=DATA.characterNames.filter(n=>!(DATA.elucidatorNames||[]).includes(n));
    let cOpts=[''].concat(compNames);
    if(u.companion && !cOpts.includes(u.companion)) cOpts=[''].concat([u.companion]).concat(compNames);
    extraBlock+=`<div class="rev-row one"><div><div class="rev-lab">Backup</div><select data-path="${path}.companion">${opt(cOpts,u.companion)}</select></div></div>`;
  }
  const overlay = `${elu?'<span class="elu-badge">ELUCIDATOR</span>':''}${idx!=null?`<span class="order-badge">${idx+1}</span>`:''}${idx!=null?'<div class="grip" draggable="true" title="Drag to reorder">\u283f</div>':''}`;
  const art = img
    ? `<div class="art" style="background-image:url('${esc(img)}')">${overlay}</div>`
    : `<div class="art"><span class="ph">${esc((u.name||'?')[0]||'?')}</span>${overlay}</div>`;
  return `<div class="unit ${elu?'elu':''}" style="--ux:${col}" ${idx!=null?`data-uidx="${idx}"`:''}>
    ${art}
    <div class="body">
      <select class="name" data-uname="${path}">${opt(nameOpts,u.name)}</select>
      <div class="tags">
        <select data-path="${path}.awareness">${opt(awareOpts,u.awareness)}</select>
        <select data-path="${path}.rev">${opt(revFull,u.rev)}</select>
      </div>
      ${revBlock}${extraBlock}
    </div></div>`;
}
function renderTeam(){
  const unitsHtml = state.units.map((u,k)=>unitCard(u,`units.${k}`,false,k)).join('') + unitCard(state.elucidator,'elucidator',true,null);
  const personaHtml = state.personas.map((p,k)=>`
    <div class="persona-col minicard" data-pidx="${k}">
      <div class="pcol-head"><label>Persona ${k+1}${k===0?' (Lead)':''}</label><span class="pgrip" draggable="true" title="Drag to reorder">\u283f</span></div>
      <select data-path="personas.${k}.name">${opt([''].concat(DATA.personaNames),p.name)}</select>
      <div class="skills">${p.skills.map((s,si)=>`<input data-path="personas.${k}.skills.${si}" value="${esc(s)}" placeholder="Skill ${si+1}"/>`).join('')}</div>
    </div>`).join('');
  document.getElementById('teamPanel').innerHTML=`
    <div class="section-title"><h2>Team</h2><div class="rule"></div></div>
    <div class="units">${unitsHtml}</div>
    <div class="persona-grid">${personaHtml}</div>
    <div class="team-notes">
      <label class="tn-label">Notes</label>
      <textarea id="teamNotes" placeholder="Team notes…"></textarea>
    </div>`;
  const tp=document.getElementById('teamPanel');
  bindPaths(tp, ()=>{ renderTeam(); renderTurns(); });
  const tn=document.getElementById('teamNotes'); tn.value=state.teamNotes||''; tn.oninput=()=>{ state.teamNotes=tn.value; save(); };
  // drag & drop reorder of personas (slot labels Persona 1/2/3 stay fixed; only the content moves)
  let dragP=null;
  tp.querySelectorAll('.persona-col .pgrip').forEach(g=>{
    g.addEventListener('dragstart',e=>{ const col=g.closest('[data-pidx]'); dragP=+col.dataset.pidx;
      col.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; try{e.dataTransfer.setData('text/plain','p');}catch(_){} });
    g.addEventListener('dragend',()=>tp.querySelectorAll('.persona-col').forEach(c=>c.classList.remove('dragging','drag-over')));
  });
  tp.querySelectorAll('[data-pidx]').forEach(col=>{
    col.addEventListener('dragover',e=>{ if(dragP!=null){ e.preventDefault(); col.classList.add('drag-over'); }});
    col.addEventListener('dragleave',()=>col.classList.remove('drag-over'));
    col.addEventListener('drop',e=>{ e.preventDefault(); col.classList.remove('drag-over');
      const to=+col.dataset.pidx;
      if(dragP!=null && dragP!==to){ const[m]=state.personas.splice(dragP,1); state.personas.splice(to,0,m); save(); renderTeam(); }
      dragP=null; });
  });
  tp.querySelectorAll('[data-uname]').forEach(el=>{
    el.onchange=()=>{
      const u=getByPath(el.dataset.uname);
      u.name=el.value;
      if((u.name||'').toUpperCase()==='WONDER'){ u.awareness='DGR'; u.rev='R6'; }
      save(); renderTeam(); renderTurns();
    };
  });
  // drag & drop reorder of the 4 main units (elucidator excluded)
  let dragIdx=null;
  tp.querySelectorAll('.unit .grip').forEach(g=>{
    g.addEventListener('dragstart',e=>{ const card=g.closest('[data-uidx]'); dragIdx=+card.dataset.uidx;
      card.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; try{e.dataTransfer.setData('text/plain','u');}catch(_){} });
    g.addEventListener('dragend',()=>tp.querySelectorAll('.unit').forEach(c=>c.classList.remove('dragging','drag-over')));
  });
  tp.querySelectorAll('[data-uidx]').forEach(card=>{
    card.addEventListener('dragover',e=>{ if(dragIdx!=null){ e.preventDefault(); card.classList.add('drag-over'); }});
    card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
    card.addEventListener('drop',e=>{ e.preventDefault(); card.classList.remove('drag-over');
      const to=+card.dataset.uidx;
      if(dragIdx!=null && dragIdx!==to){ const[m]=state.units.splice(dragIdx,1); state.units.splice(to,0,m); save(); renderTeam(); }
      dragIdx=null; });
  });
}

/* ---------- render: turns ---------- */
function teamChars(){
  const all=[...state.units, state.elucidator];
  const comp=all.filter(u=>u && (u.name||'').toUpperCase()==='FUUKA').map(u=>u.companion);
  const names=[...state.units.map(u=>u.name), state.elucidator.name, ...comp].filter(n=>n);
  const uniq=names.filter((v,i,a)=>a.indexOf(v)===i);
  return uniq.sort((x,y)=>x.toLowerCase().localeCompare(y.toLowerCase()));
}
function moveAction(from,to){
  const [m]=state.turns[from.ti].actions.splice(from.ai,1);
  let idx=to.ai;
  if(from.ti===to.ti && from.ai<to.ai) idx=to.ai-1;
  state.turns[to.ti].actions.splice(idx,0,m);
}
function actRow(a, ti, ai){
  const col=charColor(a.char);
  const team=teamChars();
  let chOpts=[''].concat(team);
  if(a.char && !chOpts.includes(a.char)) chOpts=[''].concat([a.char]).concat(team);
  return `<div class="act" style="--ax:${col}" data-ti="${ti}" data-ai="${ai}">
    <div class="n" draggable="true" title="Drag to move">${ai+1}</div>
    <div class="mid">
      <select data-tchar="${ti}.${ai}">${opt(chOpts,a.char)}</select>
      <input data-taction="${ti}.${ai}" value="${esc(a.action)}" placeholder="Action…"/>
    </div>
    <div class="act-btns">
      <button class="addrow" data-addabove="${ti}.${ai}" title="Add action above">+</button>
      <button class="x" data-delact="${ti}.${ai}" title="Remove">×</button>
      <button class="addrow" data-addbelow="${ti}.${ai}" title="Add action below">+</button>
    </div>
  </div>`;
}
function renumberTurns(){
  let changed=false;
  state.turns.forEach((t,i)=>{ const want='TURN '+(i+1); if(/^TURN\s+\d+$/i.test((t.name||'').trim()) && t.name!==want){ t.name=want; changed=true; } });
  if(changed) save();
}
function renderTurns(){
  renumberTurns();
  const wrap=document.getElementById('turns');
  wrap.innerHTML = state.turns.map((t,ti)=>`
    <div class="turn">
      <div class="turn-head">
        <span class="star">★</span>
        <input value="${esc(t.name)}" data-tname="${ti}"/>
        <button class="del" data-delturn="${ti}" title="Remove turn">×</button>
      </div>
      <div class="acts" data-ti="${ti}">${t.actions.map((a,ai)=>actRow(a,ti,ai)).join('')}</div>
      <button class="add-act" data-addact="${ti}">+ Action</button>
    </div>`).join('') + `<button class="add-turn" id="addTurn" title="Add turn">+</button>`;

  wrap.querySelectorAll('[data-tname]').forEach(el=>el.oninput=e=>{state.turns[+el.dataset.tname].name=e.target.value; save();});
  wrap.querySelectorAll('[data-taction]').forEach(el=>el.oninput=e=>{const[t,a]=el.dataset.taction.split('.');state.turns[t].actions[a].action=e.target.value; save();});
  wrap.querySelectorAll('[data-tchar]').forEach(el=>el.onchange=e=>{
    const[t,a]=el.dataset.tchar.split('.'); state.turns[t].actions[a].char=e.target.value; save();
    el.closest('.act').style.setProperty('--ax', charColor(e.target.value));
  });
  wrap.querySelectorAll('[data-delact]').forEach(el=>el.onclick=()=>{const[t,a]=el.dataset.delact.split('.');state.turns[t].actions.splice(a,1); save(); renderTurns();});
  wrap.querySelectorAll('[data-addabove]').forEach(el=>el.onclick=()=>{const[t,a]=el.dataset.addabove.split('.');state.turns[t].actions.splice(+a,0,{char:'',action:''}); save(); renderTurns();});
  wrap.querySelectorAll('[data-addbelow]').forEach(el=>el.onclick=()=>{const[t,a]=el.dataset.addbelow.split('.');state.turns[t].actions.splice(+a+1,0,{char:'',action:''}); save(); renderTurns();});
  wrap.querySelectorAll('[data-addact]').forEach(el=>el.onclick=()=>{state.turns[+el.dataset.addact].actions.push({char:'',action:''}); save(); renderTurns();});
  wrap.querySelectorAll('[data-delturn]').forEach(el=>el.onclick=()=>{if(confirm('Remove this turn?')){state.turns.splice(+el.dataset.delturn,1); save(); renderTurns();}});
  document.getElementById('addTurn').onclick=()=>{state.turns.push({name:'TURN '+(state.turns.length+1),actions:[{char:'',action:''}]}); save(); renderTurns();};

  // action drag & drop (reorder within a turn, move across turns; numbers re-index automatically)
  let dragAct=null;
  wrap.querySelectorAll('.act .n').forEach(n=>{
    n.addEventListener('dragstart',e=>{ const row=n.closest('.act'); dragAct={ti:+row.dataset.ti, ai:+row.dataset.ai};
      row.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; try{e.dataTransfer.setData('text/plain','a');}catch(_){} });
    n.addEventListener('dragend',()=>wrap.querySelectorAll('.act').forEach(r=>r.classList.remove('dragging','drop-before')));
  });
  wrap.querySelectorAll('.act').forEach(row=>{
    row.addEventListener('dragover',e=>{ if(dragAct){ e.preventDefault(); row.classList.add('drop-before'); }});
    row.addEventListener('dragleave',()=>row.classList.remove('drop-before'));
    row.addEventListener('drop',e=>{ if(!dragAct) return; e.preventDefault(); e.stopPropagation(); row.classList.remove('drop-before');
      moveAction(dragAct,{ti:+row.dataset.ti, ai:+row.dataset.ai}); dragAct=null; save(); renderTurns(); });
  });
  wrap.querySelectorAll('.acts').forEach(zone=>{
    zone.addEventListener('dragover',e=>{ if(dragAct) e.preventDefault(); });
    zone.addEventListener('drop',e=>{ if(!dragAct) return; e.preventDefault();
      const ti=+zone.dataset.ti; const [m]=state.turns[dragAct.ti].actions.splice(dragAct.ai,1);
      state.turns[ti].actions.push(m); dragAct=null; save(); renderTurns(); });
  });
}

/* ---------- generic binding ---------- */
function setPath(path,val){ const p=path.split('.'); let o=state; for(let k=0;k<p.length-1;k++) o=o[p[k]]; o[p[p.length-1]]=val; }
function getByPath(path){ const p=path.split('.'); let o=state; for(const k of p) o=o[k]; return o; }
function bind(id,path){ const el=document.getElementById(id); el.oninput=el.onchange=()=>{setPath(path, el.value); save();}; }
function bindPaths(root, afterStructural){
  root.querySelectorAll('[data-path]').forEach(el=>{
    el.onchange=()=>{ setPath(el.dataset.path, el.value);
      if(el.dataset.path.endsWith('.space')){ const ssPath=el.dataset.path.replace(/\.space$/,'.sunsky');
        const partners=(el.value && DATA.spacePartners && DATA.spacePartners[el.value]) || [];
        setPath(ssPath, partners.length===1 ? partners[0] : ''); }
      save(); if(el.classList.contains('name') || el.dataset.path.endsWith('.space') || el.dataset.path.endsWith('.companion')) afterStructural(); };
    el.oninput=()=>{ setPath(el.dataset.path, el.value); save(); };
  });
}

function renderNotes(){
  const ta=document.getElementById('notes'); ta.value=state.setup.notes||'';
  ta.oninput=()=>{state.setup.notes=ta.value; save();};
}
function renderAll(){ renderHead(); renderTeam(); renderTurns(); renderNotes(); }

/* ---------- toolbar ---------- */
document.getElementById('exportBtn').onclick=()=>{
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=(state.setup.rotationName||'rotation').replace(/\s+/g,'_')+'.json'; a.click();
};
document.getElementById('importBtn').onclick=()=>document.getElementById('importFile').click();
document.getElementById('importFile').onchange=e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader(); r.onload=()=>{ try{ state=JSON.parse(r.result); save(); renderAll(); }catch(err){ alert('Invalid JSON file.'); } }; r.readAsText(f);
};
document.getElementById('resetBtn').onclick=()=>{ if(confirm('Clear all fields?')){ state=blankState(); save(); renderAll(); } };
document.getElementById('autoFill').onclick=()=>{
  const chars=state.units.filter(u=>(u.name||'').trim()).map(u=>u.name);
  if(!chars.length){ alert('No characters in team slots 1–4 yet.'); return; }
  if(!state.turns.length){ alert('No turns to fill yet.'); return; }
  const hasContent=state.turns.some(t=>t.actions.some(a=>(a.char||'').trim() || (a.action||'').trim()));
  if(hasContent && !confirm('The turns already contain actions. Replace them with characters 1–4 in order?')) return;
  state.turns.forEach(t=>{ t.actions=chars.map(c=>({char:c, action:''})); });
  save(); renderTurns();
};
document.getElementById('clearActions').onclick=()=>{
  if(!state.turns.length) return;
  if(!confirm('Remove all actions from every turn?')) return;
  state.turns.forEach(t=>{ t.actions=[{char:'',action:''}]; });
  save(); renderTurns();
};

/* ---------- exports: image (PNG) + Google Sheets (CSV) ---------- */
function exportBaseName(){
  const s=state.setup;
  let name=[s.patch, s.type, s.rotationName||'rotation'].map(x=>(x||'').trim()).filter(Boolean).join('_');
  name=name.replace(/[\\/:*?"<>|\r\n\t]+/g,'-').replace(/\s+/g,' ').trim();
  return name||'rotation';
}
function gearText(u){ return u.gear || [u.space,u.sunsky].filter(Boolean).join(' & '); }

function buildCSV(){
  const s=state.setup, rows=[];
  const q=v=>{ v=(v==null?'':String(v)); return /[",\n\r]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; };
  rows.push(['Rotation', s.rotationName]); rows.push(['Type', s.type]); rows.push(['Patch', s.patch]);
  rows.push(['Boss', s.boss]); rows.push(['Expected Score', s.score]); rows.push(['Credits', s.credits||'']);
  rows.push([]); rows.push(['TEAM']);
  rows.push(['Slot','Name','Awareness','Rev','Gear / Space & Sun-Sky','Extra']);
  state.units.forEach((u,i)=>{
    const extra=(u.name||'').toUpperCase()==='TWINS' && u.role ? 'Role: '+u.role : '';
    rows.push([i+1, u.name, u.awareness, u.rev, gearText(u), extra]);
  });
  const e=state.elucidator;
  const ee=(e.name||'').toUpperCase()==='FUUKA' && e.companion ? 'Backup: '+e.companion : '';
  rows.push(['Elucidator', e.name, e.awareness, e.rev, gearText(e), ee]);
  rows.push([]); rows.push(['PERSONAS']); rows.push(['#','Persona','Skill 1','Skill 2','Skill 3']);
  state.personas.forEach((p,i)=>rows.push([i+1, p.name, p.skills[0]||'', p.skills[1]||'', p.skills[2]||'']));
  if((state.teamNotes||'').trim()){ rows.push([]); rows.push(['Team Notes', state.teamNotes]); }
  rows.push([]); rows.push(['ROTATION']);
  const maxA=Math.max(0,...state.turns.map(t=>t.actions.length));
  const h1=[''], h2=['#'];
  state.turns.forEach(t=>{ h1.push(t.name,''); h2.push('Char','Action'); });
  rows.push(h1); rows.push(h2);
  for(let i=0;i<maxA;i++){ const r=[i+1]; state.turns.forEach(t=>{ const a=t.actions[i]; r.push(a?a.char:'', a?a.action:''); }); rows.push(r); }
  if((s.notes||'').trim()){ rows.push([]); rows.push(['Notes', s.notes]); }
  return '\ufeff'+rows.map(r=>r.map(q).join(',')).join('\r\n');
}
function exportCSV(){
  const blob=new Blob([buildCSV()],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=exportBaseName()+'.csv'; a.click();
}

function buildExportView(withImages){
  const s=state.setup, PAD=28, COLW=212, GAP=12, TEAMW=184;
  const ord=['1st','2nd','3rd','4th'];
  const cols=Math.min(6, Math.max(1, state.turns.length));
  const turnsW=cols*COLW+(cols-1)*GAP;
  const teamRowW=5*TEAMW+4*GAP;
  const inner=Math.max(turnsW, teamRowW);
  const tc=c=>charColor(c);
  const tl=(s.type||'').toLowerCase();
  const typeBg={mld:'#f1c232',dod:'#9b5de5',nod:'#e0445e'}[tl]||'#3a3550';
  const typeFg={mld:'#3a2c00',dod:'#1a0a2e',nod:'#2c0710'}[tl]||'#fff';
  const card=(u,label,accent)=>{
    const art = withImages && imgFor(u.name) ? `<div style="width:100%;height:150px;border-radius:6px;margin-bottom:6px;background-color:#15131d;background-image:url('${imgFor(u.name)}');background-size:cover;background-position:center top;background-repeat:no-repeat;"></div>` : '';
    return `<div style="width:${TEAMW}px;background:#23202f;border:1px solid #3a3550;border-top:4px solid ${accent};border-radius:8px;padding:8px 10px;box-sizing:border-box;">
    ${art}
    <div style="font:700 10px Inter,sans-serif;color:#9d97b3;letter-spacing:.1em;">${esc(label)}</div>
    <div style="font:700 16px Oswald,sans-serif;color:#f3f1f7;margin:2px 0 4px;">${esc(u.name||'—')}</div>
    <div style="font:600 12px Inter,sans-serif;color:#cfe2f3;">${esc(u.awareness||'')}${u.awareness&&u.rev?' · ':''}${esc(u.rev||'')}</div>
    <div style="font:500 11px Inter,sans-serif;color:#9d97b3;margin-top:2px;min-height:14px;">${esc(gearText(u)||'')}</div>
    ${(u.name||'').toUpperCase()==='TWINS'&&u.role?`<div style="font:600 11px Inter,sans-serif;color:#f1c232;margin-top:2px;">Role: ${esc(u.role)}</div>`:''}
    ${(u.name||'').toUpperCase()==='FUUKA'&&u.companion?`<div style="font:600 11px Inter,sans-serif;color:#9fc5e8;margin-top:2px;">Backup: ${esc(u.companion)}</div>`:''}
  </div>`;
  };
  const teamCards=state.units.map((u,i)=>card(u, ord[i]||((i+1)+'th'), tc(u.name))).join('')+card(state.elucidator,'ELUCIDATOR','#5b9bd5');
  const persona=state.personas.filter(p=>(p.name||'').trim());
  const personaLine=persona.length?`<div style="margin-top:12px;font:500 13px Inter,sans-serif;">
    <span style="color:#9d97b3;font-weight:700;letter-spacing:.08em;">PERSONAS&nbsp;&nbsp;</span>
    ${persona.map(p=>{ const sk=p.skills.filter(Boolean); return `<span style="color:#f1c232;font-weight:700;">${esc(p.name)}</span>${sk.length?` <span style="color:#9fc5e8;">(${sk.map(esc).join(', ')})</span>`:''}`; }).join('<span style="color:#5a5470;">&nbsp;&nbsp;·&nbsp;&nbsp;</span>')}</div>`:'';
  const tnLine=(state.teamNotes||'').trim()?`<div style="margin-top:6px;font:500 13px Inter,sans-serif;color:#9d97b3;">Team Notes: <span style="color:#cfe2f3;">${esc(state.teamNotes)}</span></div>`:'';
  const turnsHtml=state.turns.map(t=>`<div style="width:${COLW}px;background:#1f1c2b;border:1px solid #3a3550;border-radius:8px;padding:8px;box-sizing:border-box;">
    <div style="font:700 13px Oswald,sans-serif;color:#9fc5e8;letter-spacing:.06em;border-bottom:1px solid #3a3550;padding-bottom:5px;margin-bottom:6px;">${esc(t.name)}</div>
    ${t.actions.map((a,i)=>`<div style="display:flex;gap:6px;align-items:flex-start;padding:3px 6px;border-left:3px solid ${tc(a.char)};margin-bottom:3px;background:#23202f;border-radius:4px;">
      <span style="font:700 11px Oswald,sans-serif;color:#9d97b3;min-width:12px;">${i+1}</span>
      <span style="font:700 11px Inter,sans-serif;color:${tc(a.char)};min-width:52px;">${esc(a.char||'')}</span>
      <span style="font:500 11px Inter,sans-serif;color:#f3f1f7;flex:1;">${esc(a.action||'')}</span></div>`).join('')}
  </div>`).join('');
  const notesLine=(s.notes||'').trim()?`<div style="margin-top:12px;font:500 13px Inter,sans-serif;color:#9d97b3;">Notes: <span style="color:#cfe2f3;">${esc(s.notes)}</span></div>`:'';
  const v=document.createElement('div'); v.id='exportView';
  v.style.cssText=`position:fixed;left:-99999px;top:0;width:${inner+2*PAD}px;background:#14121c;padding:${PAD}px;box-sizing:border-box;font-family:Inter,system-ui,sans-serif;`;
  v.innerHTML=`
    <div style="font:700 30px Oswald,sans-serif;color:#f3f1f7;letter-spacing:.02em;">${esc(s.rotationName||'Rotation')}</div>
    <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-top:8px;font:600 14px Inter,sans-serif;color:#cfe2f3;">
      <span style="background:${typeBg};color:${typeFg};font:700 14px Oswald,sans-serif;letter-spacing:.1em;padding:4px 12px;border-radius:6px;">${esc(s.type||'')}</span>
      ${s.patch?`<span><span style="color:#9d97b3;">Patch</span> ${esc(s.patch)}</span>`:''}
      ${s.boss?`<span><span style="color:#9d97b3;">Boss</span> ${esc(s.boss)}</span>`:''}
      ${s.score?`<span><span style="color:#9d97b3;">Score</span> ${esc(s.score)}</span>`:''}
      ${s.credits?`<span><span style="color:#9d97b3;">Credits</span> ${esc(s.credits)}</span>`:''}
    </div>
    <div style="display:flex;gap:${GAP}px;flex-wrap:wrap;margin-top:14px;">${teamCards}</div>
    ${personaLine}${tnLine}
    <div style="display:flex;flex-wrap:wrap;gap:${GAP}px;margin-top:16px;align-items:flex-start;width:${turnsW}px;">${turnsHtml}</div>
    ${notesLine}`;
  document.body.appendChild(v); return v;
}
function exportImage(withImages){
  if(typeof html2canvas==='undefined'){ alert('Image export needs the rendering library (requires an internet connection the first time it is used).'); return; }
  const v=buildExportView(withImages);
  html2canvas(v,{backgroundColor:'#14121c',scale:2,logging:false,useCORS:true,imageTimeout:15000}).then(canvas=>{
    v.remove();
    canvas.toBlob(blob=>{ if(!blob){ alert('Image export failed.'); return; } const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=exportBaseName()+'.png'; a.click(); },'image/png');
  }).catch(err=>{ if(v) v.remove();
    if(withImages) alert('Image export with portraits failed. This usually happens when the page is opened directly from a file. Host it (e.g. GitHub Pages) so the character images can be embedded, or use "Export Image" without portraits.');
    else alert('Image export failed: '+((err&&err.message)||err));
  });
}
document.getElementById('exportImgBtn').onclick=()=>exportImage(false);
document.getElementById('exportImgArtBtn').onclick=()=>exportImage(true);
document.getElementById('exportCsvBtn').onclick=exportCSV;

state=load(); renderAll();
</script>
